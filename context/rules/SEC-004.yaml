rule_id: SEC-004
title: "Capabilities não removidas"
pillar: Segurança
severity: high
why: |
  Por padrão containers recebem capabilities como NET_RAW (permite ARP spoofing e sniffing),
  SYS_CHROOT, AUDIT_WRITE e outras. Essas capabilities permitem ataques de rede contra
  outros pods, escalonamento de privilégios e acesso a recursos restritos do kernel.
impact: "Ataques de rede (ARP spoofing, man-in-the-middle) e escalonamento de privilégios possíveis."
fix_hint: |
  Adicione capabilities.drop: [ALL] e adicione de volta apenas as capabilities
  estritamente necessárias. A maioria das aplicações web não precisa de nenhuma capability.
yaml_example: |
  containers:
    - name: app
      securityContext:
        capabilities:
          drop: ["ALL"]
          # Adicione só se necessário:
          # add: ["NET_BIND_SERVICE"]  # para bind em porta < 1024
tags: [segurança, capabilities, net-raw, hardening, least-privilege]
related_rules: [RES-010, SEC-003]
